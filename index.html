<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1410" />
    <meta name="description" content="Reservaciones para los restaurantes de Grupo Mittoz en Isla Holbox: El Nido, Soulbox, Bocamar y Leonessa." />
    <title>Holbox Dining · Grupo Mittoz</title>
  </head>
  <body style="margin:0;padding:0;background:#0f0a06;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        console.log('Fix tab-refocus cargado v2');
        var wasHidden = false;
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') {
            wasHidden = true;
          } else if (document.visibilityState === 'visible' && wasHidden) {
            wasHidden = false;
            console.log('Recargando para refrescar Supabase');
            window.location.reload();
          }
        });
      })();
    </script>
  </body>
</html>
