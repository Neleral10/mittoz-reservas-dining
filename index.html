  <script>
      (function () {
        console.log('🔧 Fix tab-refocus cargado');
        var hiddenAt = null;
        var UMBRAL_MS = 30000;
        document.addEventListener('visibilitychange', function () {
          console.log('👁️ visibilitychange:', document.visibilityState);
          if (document.visibilityState === 'hidden') {
            hiddenAt = Date.now();
            console.log('⏸️ Pestaña oculta. Contador iniciado.');
          } else if (document.visibilityState === 'visible' && hiddenAt !== null) {
            var ocultoPor = Date.now() - hiddenAt;
            hiddenAt = null;
            console.log('▶️ Pestaña visible de nuevo. Oculta por:', Math.round(ocultoPor / 1000), 'segundos');
            if (ocultoPor > UMBRAL_MS) {
              console.log('🔄 Recargando porque estuvo oculta > 30s');
              window.location.reload();
            } else {
              console.log('⏭️ No recargo, estuvo oculta menos de 30s');
            }
          }
        });
      })();
    </script>
